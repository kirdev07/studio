    <!-- Подключаем базу программ -->

    <script>
        // Меню
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');

        mobileMenu.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        document.querySelectorAll('.nav a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });

        // Загрузка деталей
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('detail-container');
            
            // Получаем ID из query-параметров
            const urlParams = new URLSearchParams(window.location.search);
            const programId = parseInt(urlParams.get('id'));
            
            if (isNaN(programId)) {
                window.location.href = '404.html';
                return;
            }
            
            // Ищем программу
            const program = PROGRAMS.find(p => p.id === programId);
            
            if (!program) {
                window.location.href = '404.html';
                return;
            }

            // Устанавливаем мета-теги и заголовок
            document.title = `${program.name} — Скачать бесплатно на KirDev Studio`;

            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', program.description);

            // Update OpenGraph tags
            const ogTitle = document.getElementById('og-title');
            if (ogTitle) ogTitle.setAttribute('content', `${program.name} — Скачать бесплатно на KirDev Studio`);

            const ogDesc = document.getElementById('og-desc');
            if (ogDesc) ogDesc.setAttribute('content', program.description);

            const ogImg = document.getElementById('og-img');
            // Assuming cover_image is a relative path, convert to absolute for OG
            const absoluteImgUrl = window.location.origin + '/' + program.cover_image;
            if (ogImg) ogImg.setAttribute('content', absoluteImgUrl);


            const ogUrl = document.getElementById('og-url');
            if (ogUrl) ogUrl.setAttribute('content', window.location.href);

            // Генерируем разметку
            let featuresHtml = '';
            program.features.forEach(f => {
                featuresHtml += `<li style="margin-bottom: 8px;">${f}</li>`;
            });

            const isExternal = program.link.startsWith('http://') || program.link.startsWith('https://');
            const downloadUrl = isExternal ? program.link : `downloads/${program.link}`;
            const linkAttributes = isExternal 
                ? 'target="_blank" rel="noopener noreferrer"' 
                : 'download';

            container.innerHTML = `
                <a href="programs.html"
                    style="color: var(--text-secondary); text-decoration: none; display: inline-block; margin-bottom: 30px;">
                    &larr; Назад к программам
                </a>

                <!-- Cover Banner -->
                <div class="detail-banner"
                    style="width: 100%; height: 280px; overflow: hidden; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 40px; background: #000;">
                    <img loading="lazy" src="${program.cover_image}" alt="Баннер ${program.name}"
                        style="width: 100%; height: 100%; object-fit: cover; object-position: top;">
                </div>

                <div class="detail-header">
                    <div class="detail-title">
                        <h1>${program.name}</h1>
                        <div style="display: flex; align-items: center; gap: 12px; margin-top: 10px; flex-wrap: wrap;">
                            <span class="badge version-badge skeleton" style="font-size: 0.9rem; background: rgba(255,255,255,0.15); color: var(--text-primary);">Версия ${program.version}</span>
                            <span class="badge"
                                style="font-size: 0.9rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-secondary);">${program.category}</span>
                            <span
                                style="font-size: 0.9rem; color: var(--text-secondary); display: flex; align-items: center; gap: 6px;"
                                data-tooltip="Количество скачиваний">
                                <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                Скачано: <span id="detail-download-counter" class="skeleton">${program.download_count}</span> раз
                            </span>
                        </div>
                    </div>
                    <div class="detail-actions-wrapper" style="display: flex; gap: 16px; flex-wrap: wrap;">
                        <a href="#" target="_blank" rel="noopener noreferrer" class="btn-secondary lg repo-btn" style="display: none;">
                            <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                            </svg>
                            Страница на GitHub
                        </a>
                        <button id="share-btn" class="btn-secondary lg" style="display: flex; align-items: center; justify-content: center; outline: none;">
                            <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                            </svg>
                            <span id="share-text" style="margin-left: 8px;">Поделиться</span>
                        </button>
                        <a href="${downloadUrl}" ${linkAttributes} class="btn-primary lg download-btn">
                            <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Скачать безопасно
                        </a>
                    </div>
                </div>

                <div class="detail-card" style="margin-bottom: 50px;">
                    <h2 style="font-size: 1.5rem; margin-bottom: 20px;">О программе</h2>
                    <p style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.8; margin-bottom: 30px;">
                        ${program.full_description}
                    </p>

                    <h3 style="font-size: 1.25rem; margin-bottom: 16px;">Ключевые возможности:</h3>
                    <ul
                        style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.8; list-style-position: inside; margin-bottom: 0;">
                        ${featuresHtml}
                    </ul>

                    <!-- Changelog Section -->
                    <div class="changelog-section" style="display: none; margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--border-color);">
                        <h3 style="font-size: 1.25rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
                            <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            Что нового в последней версии?
                        </h3>
                        <div class="changelog-content" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; font-family: monospace; font-size: 0.95rem; color: var(--text-secondary); white-space: pre-wrap; line-height: 1.6; max-height: 300px; overflow-y: auto;">
                        </div>
                    </div>
                </div>

                <!-- Скриншоты в виде единого слайдера (Карусели) -->
                <h2 style="font-size: 1.5rem; margin-bottom: 24px;">Скриншоты</h2>
                <div class="screenshots-carousel"
                    style="position: relative; width: 100%; max-width: 100%; margin: 0 auto; aspect-ratio: 16/9; border-radius: 16px; border: 1px solid var(--border-color); overflow: hidden; background: #0a0a0a; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">

                    <!-- Slides Container -->
                    <div class="carousel-slides" id="carousel-slides" style="width: 100%; height: 100%; display: flex; position: relative;">
                        <!-- Будет заполнено через JS -->
                    </div>

                    <!-- Navigation Buttons (In-page) -->
                    <button class="carousel-btn prev" aria-label="Предыдущий слайд"
                        style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; outline: none; z-index: 10;">
                        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <button class="carousel-btn next" aria-label="Следующий слайд"
                        style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; outline: none; z-index: 10;">
                        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>

                    <!-- Dots (In-page) -->
                    <div class="carousel-dots" id="carousel-dots"
                        style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10;">
                        <!-- Будет заполнено через JS -->
                    </div>
                </div>

                <!-- Feedback Community Banner -->
                <div style="margin-top: 60px; padding: 32px; border-radius: 16px; background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid var(--border-color); text-align: center;">
                    <h3 style="font-size: 1.3rem; margin-bottom: 12px;">Нашли баг или есть идея?</h3>
                    <p style="color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; max-width: 500px; margin-left: auto; margin-right: auto;">
                        Мы — хобби-студия, и нам очень важен фидбек. Напишите нам в Telegram, если у вас есть предложения по улучшению программы или вы столкнулись с проблемой.
                    </p>
                    <a href="https://t.me/kirdev_studio?direct" target="_blank" rel="noopener noreferrer" class="btn-secondary" style="display: inline-flex; justify-content: center;">
                        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        Написать в Telegram
                    </a>
                </div>
            `;

            // Заполняем слайдер скриншотов
            const slidesContainer = document.getElementById('carousel-slides');
            const dotsContainer = document.getElementById('carousel-dots');
            
            if (program.screenshots && program.screenshots.length > 0) {
                program.screenshots.forEach((shot, index) => {
                    // Создаем слайд
                    const slide = document.createElement('div');
                    slide.className = 'carousel-slide';
                    slide.style.width = '100%';
                    slide.style.height = '100%';
                    slide.style.flexShrink = '0';
                    slide.style.display = index === 0 ? 'flex' : 'none';
                    slide.style.alignItems = 'center';
                    slide.style.justifyContent = 'center';
                    slide.style.position = 'relative';
                    slide.innerHTML = `
                        <img loading="lazy" src="${shot}" alt="Скриншот ${program.name}"
                            style="width: 100%; height: 100%; object-fit: contain; cursor: zoom-in; transition: transform 0.3s ease;"
                            class="screenshot-img"
                            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="screenshot-fallback"
                            style="display: none; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 0.9rem; text-align: center; padding: 20px;">
                            <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 8px;">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <span>Скриншот скоро появится</span>
                        </div>
                    `;
                    slidesContainer.appendChild(slide);

                    // Создаем точку
                    const dot = document.createElement('span');
                    dot.className = `carousel-dot ${index === 0 ? 'active' : ''}`;
                    dot.setAttribute('data-index', index);
                    dot.style.width = index === 0 ? '20px' : '8px';
                    dot.style.height = '8px';
                    dot.style.borderRadius = index === 0 ? '4px' : '50%';
                    dot.style.background = index === 0 ? '#fff' : 'rgba(255, 255, 255, 0.3)';
                    dot.style.cursor = 'pointer';
                    dot.style.transition = 'all 0.2s ease';
                    dotsContainer.appendChild(dot);
                });
            } else {
                // Если скриншотов нет вообще
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.style.width = '100%';
                slide.style.height = '100%';
                slide.style.display = 'flex';
                slide.style.alignItems = 'center';
                slide.style.justifyContent = 'center';
                slide.innerHTML = `
                    <div class="screenshot-fallback" style="display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 0.9rem; text-align: center; padding: 20px;">
                        <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 8px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        <span>Скриншот скоро появится</span>
                    </div>
                `;
                slidesContainer.appendChild(slide);
            }

            // Инициализация карусели и лайтбокса
            initCarouselAndLightbox();
            updateDownloadCounters();

            // Update single Share button logic (Web Share API / Clipboard Fallback)
            const shareBtn = document.getElementById('share-btn');
            const shareTextSpan = document.getElementById('share-text');
            if (shareBtn) {
                shareBtn.addEventListener('click', async () => {
                    // Force Fallback logic to show our custom toast since Playwright doesn't fully support Web Share API
                    try {
                        await navigator.clipboard.writeText(window.location.href);
                        if (window.showToast) {
                            window.showToast('✨ Ссылка скопирована в буфер обмена');
                        } else {
                            shareTextSpan.textContent = 'Ссылка скопирована!';
                            setTimeout(() => {
                                shareTextSpan.textContent = 'Поделиться';
                            }, 2000);
                        }
                    } catch (err) {
                        console.error('Не удалось скопировать ссылку: ', err);
                        if (window.showToast) {
                            window.showToast('Ошибка при копировании ссылки');
                        }
                    }
                });
            }

        });

        function initCarouselAndLightbox() {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.getElementById('lightbox-close');
            const prevBtn = document.getElementById('lightbox-prev');
            const nextBtn = document.getElementById('lightbox-next');

            const carouselSlides = document.querySelectorAll('.carousel-slide');
            const carouselDots = document.querySelectorAll('.carousel-dot');
            const carouselPrev = document.querySelector('.carousel-btn.prev');
            const carouselNext = document.querySelector('.carousel-btn.next');

            let carouselIndex = 0;

            const showCarouselImage = (index) => {
                if (carouselSlides.length === 0) return;

                if (index < 0) {
                    carouselIndex = carouselSlides.length - 1;
                } else if (index >= carouselSlides.length) {
                    carouselIndex = 0;
                } else {
                    carouselIndex = index;
                }

                carouselSlides.forEach((slide, idx) => {
                    slide.style.display = idx === carouselIndex ? 'flex' : 'none';
                });

                carouselDots.forEach((dot, idx) => {
                    if (idx === carouselIndex) {
                        dot.classList.add('active');
                        dot.style.background = '#fff';
                        dot.style.width = '20px';
                        dot.style.borderRadius = '4px';
                    } else {
                        dot.classList.remove('active');
                        dot.style.background = 'rgba(255, 255, 255, 0.3)';
                        dot.style.width = '8px';
                        dot.style.borderRadius = '50%';
                    }
                });
            };

            // Инициализация первого слайда
            showCarouselImage(0);

            if (carouselSlides.length <= 1) {
                if (carouselPrev) carouselPrev.style.display = 'none';
                if (carouselNext) carouselNext.style.display = 'none';
                const dotsContainer = document.querySelector('.carousel-dots');
                if (dotsContainer) dotsContainer.style.display = 'none';
            }

            if (carouselPrev) {
                carouselPrev.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showCarouselImage(carouselIndex - 1);
                });
            }

            if (carouselNext) {
                carouselNext.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showCarouselImage(carouselIndex + 1);
                });
            }

            carouselDots.forEach(dot => {
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(dot.getAttribute('data-index'));
                    showCarouselImage(idx);
                });
            });

            // Touch Swipe Logic for Carousel
            const carouselContainer = document.querySelector('.screenshots-carousel');
            let touchStartX = 0;
            let touchEndX = 0;

            if (carouselContainer) {
                carouselContainer.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });

                carouselContainer.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    handleSwipe();
                }, { passive: true });

                function handleSwipe() {
                    const swipeThreshold = 50; // Minimum distance to register as a swipe
                    if (touchEndX < touchStartX - swipeThreshold) {
                        // Swiped left
                        showCarouselImage(carouselIndex + 1);
                    }
                    if (touchEndX > touchStartX + swipeThreshold) {
                        // Swiped right
                        showCarouselImage(carouselIndex - 1);
                    }
                }
            }

            // Лайтбокс
            const screenshots = Array.from(document.querySelectorAll('.screenshot-img'))
                .filter(img => img.style.display !== 'none')
                .map(img => img.src);
            let currentIndex = 0;

            const showImage = (index) => {
                if (screenshots.length === 0) return;

                if (index < 0) {
                    currentIndex = screenshots.length - 1;
                } else if (index >= screenshots.length) {
                    currentIndex = 0;
                } else {
                    currentIndex = index;
                }

                showCarouselImage(currentIndex);

                lightboxImg.style.opacity = '0';
                lightboxImg.style.transform = 'scale(0.98)';

                setTimeout(() => {
                    lightboxImg.src = screenshots[currentIndex];
                    lightboxImg.style.opacity = '1';
                    lightboxImg.style.transform = 'scale(1)';
                }, 150);

                if (screenshots.length <= 1) {
                    prevBtn.style.display = 'none';
                    nextBtn.style.display = 'none';
                } else {
                    prevBtn.style.display = 'flex';
                    nextBtn.style.display = 'flex';
                }
            };

            document.querySelectorAll('.screenshot-img').forEach((img) => {
                img.addEventListener('click', () => {
                    const activeScreenshots = Array.from(document.querySelectorAll('.screenshot-img'))
                        .filter(i => i.style.display !== 'none')
                        .map(i => i.src);

                    const activeIndex = activeScreenshots.indexOf(img.src);

                    screenshots.length = 0;
                    screenshots.push(...activeScreenshots);

                    lightbox.style.display = 'flex';
                    showImage(activeIndex);

                    setTimeout(() => {
                        lightbox.style.opacity = '1';
                    }, 10);
                });
            });

            const closeLightbox = () => {
                lightbox.style.opacity = '0';
                lightboxImg.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    lightbox.style.display = 'none';
                }, 300);
            };

            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            closeBtn.addEventListener('click', closeLightbox);

            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showImage(currentIndex - 1);
            });

            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showImage(currentIndex + 1);
            });

            lightboxImg.addEventListener('click', (e) => {
                e.stopPropagation();
                if (screenshots.length > 1) {
                    showImage(currentIndex + 1);
                }
            });

            document.addEventListener('keydown', (e) => {
                if (lightbox.style.display === 'flex') {
                    if (e.key === 'Escape') {
                        closeLightbox();
                    } else if (e.key === 'ArrowLeft') {
                        showImage(currentIndex - 1);
                    } else if (e.key === 'ArrowRight') {
                        showImage(currentIndex + 1);
                    }
                }
            });
        }
    </script>

    <!-- Scroll to Top Button -->
    <button id="scroll-to-top" aria-label="Наверх">
        <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>


    <!-- Scroll to Top Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const scrollToTopBtn = document.getElementById('scroll-to-top');
            if (scrollToTopBtn) {
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 300) {
                        scrollToTopBtn.classList.add('visible');
                    } else {
                        scrollToTopBtn.classList.remove('visible');
                    }
                });

                scrollToTopBtn.addEventListener('click', () => {
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth'
                    });
                });
            }
        });
    </script>


    <!-- Theme Toggle Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle');
            const sunIcon = themeToggle.querySelector('.sun-icon');
            const moonIcon = themeToggle.querySelector('.moon-icon');

            const updateIcons = () => {
                if (document.documentElement.getAttribute('data-theme') === 'light') {
                    sunIcon.style.display = 'none';
                    moonIcon.style.display = 'block';
                } else {
                    sunIcon.style.display = 'block';
                    moonIcon.style.display = 'none';
                }
            };

            updateIcons();

            themeToggle.addEventListener('click', () => {
                let currentTheme = document.documentElement.getAttribute('data-theme');
                let newTheme = currentTheme === 'light' ? 'dark' : 'light';

                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateIcons();
            });
        });
    </script>
