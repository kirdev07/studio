<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Neon Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Rounded Rectangle Background -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="8" />

  <!-- Glowing Accent Ring inside -->
  <rect x="40" y="40" width="432" height="432" rx="96" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.3" />

  <!-- Code Bracket Graphics (Sleek Modern Design) -->
  <g filter="url(#glow)">
    <!-- Left Bracket: < -->
    <path d="M 190 160 L 90 256 L 190 352" 
          fill="none" 
          stroke="url(#accentGrad)" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Right Bracket: > -->
    <path d="M 322 160 L 422 256 L 322 352" 
          fill="none" 
          stroke="url(#accentGrad)" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Central Slash: / -->
    <line x1="280" y1="130" x2="232" y2="382" 
          stroke="#38bdf8" 
          stroke-width="36" 
          stroke-linecap="round" />
  </g>
</svg>