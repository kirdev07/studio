    <script>
        // Загрузка деталей
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('detail-container');
            
            // Получаем ID из query-параметров
            const urlParams = new URLSearchParams(window.location.search);
            const programId = parseInt(urlParams.get('id'));
            
            if (isNaN(programId)) {
                window.location.href = '404.html';
                return;
            }
            
            // Ищем программу
            const program = PROGRAMS.find(p => p.id === programId);
            
            if (!program) {
                window.location.href = '404.html';
                return;
            }

            // Устанавливаем мета-теги и заголовок
            document.title = `${program.name} — Скачать бесплатно на KirDev Studio`;

            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', program.description);

            // Update OpenGraph tags
            const ogTitle = document.getElementById('og-title');
            if (ogTitle) ogTitle.setAttribute('content', `${program.name} — Скачать бесплатно на KirDev Studio`);

            const ogDesc = document.getElementById('og-desc');
            if (ogDesc) ogDesc.setAttribute('content', program.description);

            const ogImg = document.getElementById('og-img');
            // Assuming cover_image is a relative path, convert to absolute for OG
            const absoluteImgUrl = window.location.origin + '/' + program.cover_image;
            if (ogImg) ogImg.setAttribute('content', absoluteImgUrl);


            const ogUrl = document.getElementById('og-url');
            if (ogUrl) ogUrl.setAttribute('content', window.location.href);

            // Генерируем разметку
            let featuresHtml = '';
            program.features.forEach(f => {
                featuresHtml += `<li>${f}</li>`;
            });

            const isExternal = program.link.startsWith('http://') || program.link.startsWith('https://');
            const downloadUrl = isExternal ? program.link : `downloads/${program.link}`;
            const linkAttributes = isExternal 
                ? 'target="_blank" rel="noopener noreferrer"' 
                : 'download';

            container.innerHTML = `
                <a href="programs.html" class="detail-back-link">
                    &larr; Назад к разработкам
                </a>

                <div class="detail-hero-block">
                    <h1 class="detail-title-main">${program.name}</h1>
                    
                    <div class="detail-meta">
                        <span class="version-badge skeleton detail-version">v${program.version}</span>
                        <span>•</span>
                        <span>${program.category}</span>
                        <span>•</span>
                        <span class="icon-label">
                            <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            <span id="detail-download-counter" class="skeleton">${program.download_count}</span> скачиваний
                        </span>
                    </div>

                    <div class="detail-actions-wrapper">
                        <a href="${downloadUrl}" ${linkAttributes} class="download-btn detail-download-btn detail-action-btn">
                            <svg class="icon-spaced" aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Скачать безопасно
                        </a>
                        <a href="#" target="_blank" rel="noopener noreferrer" class="repo-btn">
                            <svg class="icon-spaced" aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                            Исходный код
                        </a>
                        <button id="share-btn" class="share-btn">
                            <svg class="icon-spaced" aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                            <span id="share-text">Поделиться</span>
                        </button>
                    </div>
                </div>

                <div class="detail-section">
                    <h2 class="detail-section-title">О разработке</h2>
                    <p class="detail-description">
                        ${program.full_description}
                    </p>

                    <h3 class="detail-subtitle">Ключевые возможности:</h3>
                    <ul class="feature-list">
                        ${featuresHtml}
                    </ul>

                    <div class="changelog-section">
                        <h3 class="changelog-title">Что нового</h3>
                        <div class="changelog-content">
                        </div>
                    </div>
                </div>

                <!-- Скриншоты в виде единого слайдера (Карусели) -->
                <h2 class="screenshots-title">Скриншоты</h2>
                <div class="screenshots-carousel">

                    <!-- Slides Container -->
                    <div class="carousel-slides" id="carousel-slides">
                        <!-- Будет заполнено через JS -->
                    </div>

                    <!-- Navigation Buttons (In-page) -->
                    <button class="carousel-btn prev" aria-label="Предыдущий слайд">
                        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <button class="carousel-btn next" aria-label="Следующий слайд">
                        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>

                    <!-- Dots (In-page) -->
                    <div class="carousel-dots" id="carousel-dots">
                        <!-- Будет заполнено через JS -->
                    </div>
                </div>

                <!-- Feedback Community Banner -->
                <div class="feedback-banner">
                    <h3 class="feedback-title">Нашли баг или есть идея?</h3>
                    <p class="feedback-copy">
                        Мы — хобби-студия, и нам очень важен фидбек. Напишите нам в Telegram, если у вас есть предложения по улучшению программы или вы столкнулись с проблемой.
                    </p>
                    <a href="https://t.me/kirdev_studio?direct" target="_blank" rel="noopener noreferrer" class="btn-secondary telegram-feedback-link">
                        <svg class="icon-spaced" aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        Написать в Telegram
                    </a>
                </div>
            `;

            // Заполняем слайдер скриншотов
            const slidesContainer = document.getElementById('carousel-slides');
            const dotsContainer = document.getElementById('carousel-dots');
            
            if (program.screenshots && program.screenshots.length > 0) {
                program.screenshots.forEach((shot, index) => {
                    // Создаем слайд
                    const slide = document.createElement('div');
                    slide.className = `carousel-slide ${index === 0 ? 'active' : ''}`;
                    slide.innerHTML = `
                        <img loading="lazy" src="${shot.replace('./', '../')}" alt="Скриншот ${program.name}"
                            class="screenshot-img"
                            onerror="this.classList.add('is-hidden'); this.nextElementSibling.classList.add('is-visible');">
                        <div class="screenshot-fallback">
                            <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="screenshot-fallback-icon">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <span>Скриншот скоро появится</span>
                        </div>
                    `;
                    slidesContainer.appendChild(slide);

                    // Создаем точку
                    const dot = document.createElement('span');
                    dot.className = `carousel-dot ${index === 0 ? 'active' : ''}`;
                    dot.setAttribute('data-index', index);
                    dotsContainer.appendChild(dot);
                });
            } else {
                // Если скриншотов нет вообще
                const slide = document.createElement('div');
                slide.className = 'carousel-slide active';
                slide.innerHTML = `
                    <div class="screenshot-fallback is-visible">
                        <svg class="screenshot-fallback-icon" aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        <span>Скриншот скоро появится</span>
                    </div>
                `;
                slidesContainer.appendChild(slide);
            }

            // Инициализация карусели и лайтбокса
            initCarouselAndLightbox();
            updateDownloadCounters();

            // Update single Share button logic (Web Share API / Clipboard Fallback)
            const shareBtn = document.getElementById('share-btn');
            const shareTextSpan = document.getElementById('share-text');
            if (shareBtn) {
                shareBtn.addEventListener('click', async () => {
                    // Force Fallback logic to show our custom toast since Playwright doesn't fully support Web Share API
                    try {
                        await navigator.clipboard.writeText(window.location.href);
                        if (window.showToast) {
                            window.showToast('✨ Ссылка скопирована в буфер обмена');
                        } else {
                            shareTextSpan.textContent = 'Ссылка скопирована!';
                            setTimeout(() => {
                                shareTextSpan.textContent = 'Поделиться';
                            }, 2000);
                        }
                    } catch (err) {
                        console.error('Не удалось скопировать ссылку: ', err);
                        if (window.showToast) {
                            window.showToast('Ошибка при копировании ссылки');
                        }
                    }
                });
            }

        });

        function initCarouselAndLightbox() {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.getElementById('lightbox-close');
            const prevBtn = document.getElementById('lightbox-prev');
            const nextBtn = document.getElementById('lightbox-next');

            const carouselSlides = document.querySelectorAll('.carousel-slide');
            const carouselDots = document.querySelectorAll('.carousel-dot');
            const carouselPrev = document.querySelector('.carousel-btn.prev');
            const carouselNext = document.querySelector('.carousel-btn.next');

            let carouselIndex = 0;

            const showCarouselImage = (index) => {
                if (carouselSlides.length === 0) return;

                if (index < 0) {
                    carouselIndex = carouselSlides.length - 1;
                } else if (index >= carouselSlides.length) {
                    carouselIndex = 0;
                } else {
                    carouselIndex = index;
                }

                carouselSlides.forEach((slide, idx) => {
                    slide.classList.toggle('active', idx === carouselIndex);
                });

                carouselDots.forEach((dot, idx) => {
                    dot.classList.toggle('active', idx === carouselIndex);
                });
            };

            // Инициализация первого слайда
            showCarouselImage(0);

            if (carouselSlides.length <= 1) {
                if (carouselPrev) carouselPrev.classList.add('is-hidden');
                if (carouselNext) carouselNext.classList.add('is-hidden');
                const dotsContainer = document.querySelector('.carousel-dots');
                if (dotsContainer) dotsContainer.classList.add('is-hidden');
            }

            if (carouselPrev) {
                carouselPrev.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showCarouselImage(carouselIndex - 1);
                });
            }

            if (carouselNext) {
                carouselNext.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showCarouselImage(carouselIndex + 1);
                });
            }

            carouselDots.forEach(dot => {
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(dot.getAttribute('data-index'));
                    showCarouselImage(idx);
                });
            });

            // Touch Swipe Logic for Carousel
            const carouselContainer = document.querySelector('.screenshots-carousel');
            let touchStartX = 0;
            let touchEndX = 0;

            if (carouselContainer) {
                carouselContainer.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });

                carouselContainer.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    handleSwipe();
                }, { passive: true });

                function handleSwipe() {
                    const swipeThreshold = 50; // Minimum distance to register as a swipe
                    if (touchEndX < touchStartX - swipeThreshold) {
                        // Swiped left
                        showCarouselImage(carouselIndex + 1);
                    }
                    if (touchEndX > touchStartX + swipeThreshold) {
                        // Swiped right
                        showCarouselImage(carouselIndex - 1);
                    }
                }
            }

            // Лайтбокс
            const screenshots = Array.from(document.querySelectorAll('.screenshot-img'))
                .filter(img => !img.classList.contains('is-hidden'))
                .map(img => img.src);
            let currentIndex = 0;

            const showImage = (index) => {
                if (screenshots.length === 0) return;

                if (index < 0) {
                    currentIndex = screenshots.length - 1;
                } else if (index >= screenshots.length) {
                    currentIndex = 0;
                } else {
                    currentIndex = index;
                }

                showCarouselImage(currentIndex);

                lightboxImg.classList.remove('is-loaded');
                lightboxImg.classList.add('is-switching');

                setTimeout(() => {
                    lightboxImg.src = screenshots[currentIndex];
                    lightboxImg.classList.remove('is-switching');
                    lightboxImg.classList.add('is-loaded');
                }, 150);

                if (screenshots.length <= 1) {
                    prevBtn.classList.add('is-hidden');
                    nextBtn.classList.add('is-hidden');
                } else {
                    prevBtn.classList.remove('is-hidden');
                    nextBtn.classList.remove('is-hidden');
                }
            };

            document.querySelectorAll('.screenshot-img').forEach((img) => {
                img.addEventListener('click', () => {
                    const activeScreenshots = Array.from(document.querySelectorAll('.screenshot-img'))
                        .filter(i => !i.classList.contains('is-hidden'))
                        .map(i => i.src);

                    const activeIndex = activeScreenshots.indexOf(img.src);

                    screenshots.length = 0;
                    screenshots.push(...activeScreenshots);

                    lightbox.classList.add('is-open');
                    showImage(activeIndex);

                    setTimeout(() => {
                        lightbox.classList.add('is-visible');
                    }, 10);
                });
            });

            const closeLightbox = () => {
                lightbox.classList.remove('is-visible');
                lightboxImg.classList.remove('is-loaded');
                setTimeout(() => {
                    lightbox.classList.remove('is-open');
                }, 300);
            };

            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            closeBtn.addEventListener('click', closeLightbox);

            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showImage(currentIndex - 1);
            });

            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showImage(currentIndex + 1);
            });

            lightboxImg.addEventListener('click', (e) => {
                e.stopPropagation();
                if (screenshots.length > 1) {
                    showImage(currentIndex + 1);
                }
            });

            document.addEventListener('keydown', (e) => {
                if (lightbox.classList.contains('is-open')) {
                    if (e.key === 'Escape') {
                        closeLightbox();
                    } else if (e.key === 'ArrowLeft') {
                        showImage(currentIndex - 1);
                    } else if (e.key === 'ArrowRight') {
                        showImage(currentIndex + 1);
                    }
                }
            });
        }
    </script>
